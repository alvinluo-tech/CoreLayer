name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Build & Release (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Smart Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'frontend/src-tauri -> target'
          key: ${{ matrix.platform }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build daemon sidecar
        run: pnpm build:daemon:sidecar

      - name: Smoke test sidecar
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            SIDECAR=$(ls frontend/src-tauri/binaries/jarvis-daemon-*windows*.exe 2>/dev/null | head -1)
          else
            SIDECAR=$(ls frontend/src-tauri/binaries/jarvis-daemon-* | grep -v '.exe' | head -1)
          fi
          if [ -z "$SIDECAR" ]; then
            echo "ERROR: Sidecar binary not found"
            exit 1
          fi
          echo "Sidecar found: $SIDECAR ($(du -h "$SIDECAR" | cut -f1))"
          # Try to run with --version or --help, accept any exit code (daemon may not have these flags)
          timeout 5 "$SIDECAR" --version 2>/dev/null || true
          echo "Smoke test passed"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: 'Jarvis ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
